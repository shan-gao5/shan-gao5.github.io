<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["$", "$"], ["\\(", "\\)"]],
        displayMath: [["$$", "$$"], ["\\[", "\\]"]]
      },
      svg: {
        fontCache: "global"
      }
    };

  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #faf8f3;
      --text: #1d1b18;
      --muted: #5f5a52;
      --accent: #6b4f2a;
      --line: #ded8cc;
      --panel: #fffdf8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      line-height: 1.65;
    }

    header,
    main,
    footer {
      max-width: 760px;
      margin: 0 auto;
      padding-right: 1.5rem;
      padding-left: 1.5rem;
    }

    header {
      padding-top: 2rem;
      padding-bottom: 1rem;
    }

    h1,
    h2,
    h3 {
      font-weight: 500;
      line-height: 1.2;
    }

    h1 {
      margin-bottom: 0.5rem;
      font-size: clamp(2.1rem, 7vw, 3.8rem);
      letter-spacing: -0.04em;
    }

    main {
      padding-top: 1rem;
      padding-bottom: 3rem;
    }

    a {
      color: var(--accent);
    }

    pre {
      overflow-x: auto;
      padding: 1rem;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
    }

    code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }

    img {
      max-width: 100%;
    }

    .meta,
    footer {
      color: var(--muted);
      font-size: 0.95rem;
    }

    footer {
      padding-bottom: 2rem;
    }
  </style>
</head>
<body>
  <header>
    <a href="/blog.html">Blog</a>
    <h1>test1</h1>
    <div class="meta">2026-05-21 · test1</div>
  </header>

  <main>
<p>test1</p>

  </main>

  <footer>

  </footer>
</body>
