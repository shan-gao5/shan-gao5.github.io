<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigator | Gumloop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --accent-blue: #3b82f6;
            --accent-cyan: #22d3ee;
            --accent-purple: #a855f7;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: rgba(148, 163, 184, 0.1);
            --glow-blue: rgba(59, 130, 246, 0.4);
            --glow-cyan: rgba(34, 211, 238, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .bg-gradient {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59, 130, 246, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(168, 85, 247, 0.1), transparent);
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 520px;
            margin: 0 auto;
            padding: 24px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px var(--glow-blue);
        }

        .logo-icon svg {
            width: 24px;
            height: 24px;
            color: white;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 100px;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: pulse 2s ease-in-out infinite;
        }

        .status-dot.inactive {
            background: var(--text-muted);
            animation: none;
        }

        .status-dot.error {
            background: var(--accent-red);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(59, 130, 246, 0.2);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .card-title svg {
            width: 18px;
            height: 18px;
            color: var(--accent-cyan);
        }

        .card-action {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .card-action:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .coordinates {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .coord-box {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
        }

        .coord-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            font-family: 'Space Mono', monospace;
        }

        .coord-value {
            font-family: 'Space Mono', monospace;
            font-size: 1rem;
            color: var(--accent-cyan);
            font-weight: 700;
        }

        .address-display {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
        }

        .address-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-family: 'Space Mono', monospace;
        }

        .address-text {
            font-size: 0.9375rem;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .address-text.loading {
            color: var(--text-muted);
            font-style: italic;
        }

        .speech-container {
            position: relative;
        }

        .speech-display {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            min-height: 120px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }

        .speech-display.recording {
            border-color: var(--accent-red);
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.2);
        }

        .speech-text {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-primary);
        }

        .speech-text.placeholder {
            color: var(--text-muted);
            font-style: italic;
        }

        .speech-text.transcribing {
            color: var(--accent-cyan);
        }

        .speech-controls {
            display: flex;
            gap: 12px;
        }

        .mic-button {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border: none;
            border-radius: 14px;
            color: white;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px var(--glow-blue);
        }

        .mic-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--glow-blue);
        }

        .mic-button:active {
            transform: translateY(0);
        }

        .mic-button.recording {
            background: linear-gradient(135deg, var(--accent-red), #f87171);
            animation: recordPulse 1.5s ease-in-out infinite;
        }

        @keyframes recordPulse {
            0%, 100% { box-shadow: 0 4px 20px rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 4px 40px rgba(239, 68, 68, 0.6); }
        }

        .mic-button svg {
            width: 20px;
            height: 20px;
        }

        .clear-button {
            padding: 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .clear-button:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .clear-button svg {
            width: 20px;
            height: 20px;
        }

        .submit-section {
            margin-top: auto;
            padding-top: 16px;
        }

        .webhook-config {
            margin-bottom: 16px;
        }

        .webhook-label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-family: 'Space Mono', monospace;
        }

        .webhook-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Space Mono', monospace;
            font-size: 0.8125rem;
            transition: all 0.2s ease;
        }

        .webhook-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .webhook-input::placeholder {
            color: var(--text-muted);
        }

        .submit-button {
            width: 100%;
            padding: 18px 24px;
            background: linear-gradient(135deg, var(--accent-green), #34d399);
            border: none;
            border-radius: 16px;
            color: white;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
        }

        .submit-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(16, 185, 129, 0.4);
        }

        .submit-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .submit-button.loading {
            pointer-events: none;
        }

        .submit-button svg {
            width: 20px;
            height: 20px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Response/Directions Card */
        .response-card {
            background: var(--bg-secondary);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 20px;
            padding: 24px;
            margin-top: 16px;
            animation: slideUp 0.3s ease;
        }

        .response-card.error {
            border-color: rgba(239, 68, 68, 0.3);
        }

        .response-card.processing {
            border-color: rgba(59, 130, 246, 0.3);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .response-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--accent-green);
        }

        .response-card.error .response-header {
            color: var(--accent-red);
        }

        .response-card.processing .response-header {
            color: var(--accent-blue);
        }

        .response-header svg {
            width: 22px;
            height: 22px;
        }

        /* Directions styling */
        .directions-content {
            background: var(--bg-primary);
            border-radius: 16px;
            padding: 20px;
            font-size: 0.9375rem;
            line-height: 1.8;
            color: var(--text-primary);
            max-height: 400px;
            overflow-y: auto;
        }

        .directions-content::-webkit-scrollbar {
            width: 6px;
        }

        .directions-content::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
            border-radius: 3px;
        }

        .directions-content::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 3px;
        }

        .directions-content p {
            margin-bottom: 12px;
        }

        .directions-content strong {
            color: var(--accent-cyan);
        }

        /* Processing status */
        .processing-status {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: var(--bg-primary);
            border-radius: 12px;
        }

        .processing-spinner {
            width: 24px;
            height: 24px;
            border: 3px solid var(--bg-tertiary);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .processing-text {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .processing-text span {
            color: var(--accent-cyan);
            font-family: 'Space Mono', monospace;
        }

        /* Accuracy indicator */
        .accuracy-bar {
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .accuracy-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'Space Mono', monospace;
        }

        .accuracy-track {
            flex: 1;
            height: 4px;
            background: var(--bg-primary);
            border-radius: 2px;
            overflow: hidden;
        }

        .accuracy-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan));
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .info-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 16px;
        }

        .wave-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            height: 20px;
        }

        .wave-bar {
            width: 3px;
            height: 100%;
            background: white;
            border-radius: 2px;
            animation: wave 0.8s ease-in-out infinite;
        }

        .wave-bar:nth-child(1) { animation-delay: 0s; }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; }

        @keyframes wave {
            0%, 100% { transform: scaleY(0.3); }
            50% { transform: scaleY(1); }
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            font-size: 0.875rem;
            color: var(--accent-red);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .error-message svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .hidden {
            display: none !important;
        }

        /* Speak button for TTS */
        .speak-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
            padding: 12px 20px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-secondary);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .speak-button:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-color: var(--accent-cyan);
        }

        .speak-button.speaking {
            background: rgba(34, 211, 238, 0.1);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        .speak-button svg {
            width: 18px;
            height: 18px;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-gradient"></div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
                    </svg>
                </div>
                <span class="logo-text">Navigator</span>
            </div>
            <div class="status-badge">
                <span class="status-dot" id="gpsStatus"></span>
                <span id="gpsStatusText">Locating...</span>
            </div>
        </header>

        <!-- Location Card -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
                    </svg>
                    Current Location
                </div>
                <button class="card-action" id="refreshLocation">
                    Refresh
                </button>
            </div>

            <div class="coordinates">
                <div class="coord-box">
                    <div class="coord-label">LATITUDE</div>
                    <div class="coord-value" id="latitude">---.------</div>
                </div>
                <div class="coord-box">
                    <div class="coord-label">LONGITUDE</div>
                    <div class="coord-value" id="longitude">---.------</div>
                </div>
            </div>

            <div class="address-display">
                <div class="address-label">ADDRESS</div>
                <div class="address-text loading" id="address">Waiting for location...</div>
            </div>

            <div class="accuracy-bar">
                <span class="accuracy-label">Accuracy</span>
                <div class="accuracy-track">
                    <div class="accuracy-fill" id="accuracyFill" style="width: 0%"></div>
                </div>
                <span class="accuracy-label" id="accuracyValue">--m</span>
            </div>
        </div>

        <!-- Speech Card -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z" />
                    </svg>
                    Voice Input
                </div>
            </div>

            <div class="speech-container">
                <div class="speech-display" id="speechDisplay">
                    <div class="speech-text placeholder" id="speechText">Tap the microphone to speak your destination or instructions...</div>
                </div>

                <div id="speechError" class="error-message hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
                    </svg>
                    <span id="speechErrorText"></span>
                </div>

                <div class="speech-controls">
                    <button class="mic-button" id="micButton">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z" />
                        </svg>
                        <span id="micButtonText">Start Speaking</span>
                    </button>
                    <button class="clear-button" id="clearSpeech" title="Clear">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Submit Section -->
        <div class="submit-section">
            <div class="webhook-config">
                <label class="webhook-label">GUMLOOP API URL</label>
                <input 
                    type="text" 
                    class="webhook-input" 
                    id="webhookUrl" 
                    placeholder="https://api.gumloop.com/api/v1/start_pipeline?api_key=..."
                    value=""
                >
            </div>

            <button class="submit-button" id="submitButton">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
                </svg>
                <span id="submitButtonText">Get Directions</span>
            </button>

            <div id="responseContainer"></div>

            <p class="info-text">
                Location updates automatically • Speech recognition requires microphone access
            </p>
        </div>
    </div>

    <script>
        // State
        let currentLocation = {
            lat: null,
            lng: null,
            accuracy: null,
            address: null
        };
        let speechText = '';
        let isRecording = false;
        let recognition = null;
        let watchId = null;
        let currentDirections = '';
        let isSpeaking = false;

        // DOM Elements
        const gpsStatus = document.getElementById('gpsStatus');
        const gpsStatusText = document.getElementById('gpsStatusText');
        const latitudeEl = document.getElementById('latitude');
        const longitudeEl = document.getElementById('longitude');
        const addressEl = document.getElementById('address');
        const accuracyFill = document.getElementById('accuracyFill');
        const accuracyValue = document.getElementById('accuracyValue');
        const speechDisplay = document.getElementById('speechDisplay');
        const speechTextEl = document.getElementById('speechText');
        const micButton = document.getElementById('micButton');
        const clearSpeech = document.getElementById('clearSpeech');
        const speechError = document.getElementById('speechError');
        const speechErrorText = document.getElementById('speechErrorText');
        const webhookUrl = document.getElementById('webhookUrl');
        const submitButton = document.getElementById('submitButton');
        const responseContainer = document.getElementById('responseContainer');
        const refreshLocation = document.getElementById('refreshLocation');

        // Extract API key and other params from URL
        function parseWebhookUrl(url) {
            try {
                const urlObj = new URL(url);
                return {
                    baseUrl: urlObj.origin + urlObj.pathname,
                    apiKey: urlObj.searchParams.get('api_key'),
                    userId: urlObj.searchParams.get('user_id'),
                    savedItemId: urlObj.searchParams.get('saved_item_id')
                };
            } catch (e) {
                return null;
            }
        }

        // Build the payload
        function buildPayload() {
            const locationStr = currentLocation.address || 
                (currentLocation.lat && currentLocation.lng ? 
                    `${currentLocation.lat}, ${currentLocation.lng}` : 
                    '1200 Av des Pins O #5th, Montreal, QC H3G 1A1');
            
            return {
                speech_input: speechText || 'I want to walk to Eaton Centre in Montreal.',
                location_input: locationStr
            };
        }

        // Initialize Geolocation
        function initGeolocation() {
            if (!navigator.geolocation) {
                updateGpsStatus('error', 'Not supported');
                return;
            }

            watchId = navigator.geolocation.watchPosition(
                handlePositionSuccess,
                handlePositionError,
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        function handlePositionSuccess(position) {
            currentLocation.lat = position.coords.latitude;
            currentLocation.lng = position.coords.longitude;
            currentLocation.accuracy = position.coords.accuracy;

            latitudeEl.textContent = currentLocation.lat.toFixed(6);
            longitudeEl.textContent = currentLocation.lng.toFixed(6);

            const accuracyPercent = Math.max(0, Math.min(100, (100 - currentLocation.accuracy) / 95 * 100));
            accuracyFill.style.width = `${accuracyPercent}%`;
            accuracyValue.textContent = `${Math.round(currentLocation.accuracy)}m`;

            updateGpsStatus('active', 'GPS Active');
            reverseGeocode(currentLocation.lat, currentLocation.lng);
        }

        function handlePositionError(error) {
            console.error('Geolocation error:', error);
            switch (error.code) {
                case error.PERMISSION_DENIED:
                    updateGpsStatus('error', 'Permission denied');
                    addressEl.textContent = 'Please enable location access';
                    break;
                case error.POSITION_UNAVAILABLE:
                    updateGpsStatus('error', 'Unavailable');
                    addressEl.textContent = 'Location unavailable';
                    break;
                case error.TIMEOUT:
                    updateGpsStatus('error', 'Timeout');
                    addressEl.textContent = 'Request timed out';
                    break;
                default:
                    updateGpsStatus('error', 'Error');
                    addressEl.textContent = 'Unknown error';
            }
            addressEl.classList.add('loading');
        }

        function updateGpsStatus(status, text) {
            gpsStatus.className = 'status-dot';
            if (status === 'error') gpsStatus.classList.add('error');
            else if (status === 'inactive') gpsStatus.classList.add('inactive');
            gpsStatusText.textContent = text;
        }

        async function reverseGeocode(lat, lng) {
            try {
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`,
                    { headers: { 'User-Agent': 'GumloopNavigator/1.0' } }
                );
                const data = await response.json();
                
                if (data.display_name) {
                    currentLocation.address = data.display_name;
                    addressEl.textContent = data.display_name;
                    addressEl.classList.remove('loading');
                }
            } catch (error) {
                console.error('Reverse geocoding error:', error);
                currentLocation.address = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                addressEl.textContent = currentLocation.address;
                addressEl.classList.remove('loading');
            }
        }

        // Speech Recognition
        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                speechError.classList.remove('hidden');
                speechErrorText.textContent = 'Speech recognition not supported. Try Chrome or Edge.';
                micButton.disabled = true;
                return;
            }

            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                isRecording = true;
                updateMicButton();
                speechDisplay.classList.add('recording');
                speechError.classList.add('hidden');
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript;
                    } else {
                        interimTranscript += transcript;
                    }
                }

                if (finalTranscript) {
                    speechText = (speechText + ' ' + finalTranscript).trim();
                }

                const displayText = speechText + (interimTranscript ? ' ' + interimTranscript : '');
                speechTextEl.textContent = displayText || 'Listening...';
                speechTextEl.className = 'speech-text' + (interimTranscript ? ' transcribing' : '');
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                if (event.error !== 'no-speech') {
                    speechError.classList.remove('hidden');
                    speechErrorText.textContent = `Error: ${event.error}`;
                }
                stopRecording();
            };

            recognition.onend = () => {
                if (isRecording) {
                    try { recognition.start(); } catch (e) { stopRecording(); }
                }
            };
        }

        function toggleRecording() {
            if (isRecording) stopRecording();
            else startRecording();
        }

        function startRecording() {
            if (!recognition) initSpeechRecognition();
            if (recognition) {
                try { recognition.start(); } catch (e) { console.error('Failed to start:', e); }
            }
        }

        function stopRecording() {
            isRecording = false;
            if (recognition) recognition.stop();
            updateMicButton();
            speechDisplay.classList.remove('recording');
        }

        function updateMicButton() {
            if (isRecording) {
                micButton.classList.add('recording');
                micButton.innerHTML = `
                    <div class="wave-container">
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                    </div>
                    <span>Stop Recording</span>
                `;
            } else {
                micButton.classList.remove('recording');
                micButton.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z" />
                    </svg>
                    <span>Start Speaking</span>
                `;
            }
        }

        function clearSpeechText() {
            speechText = '';
            speechTextEl.textContent = 'Tap the microphone to speak your destination...';
            speechTextEl.className = 'speech-text placeholder';
            speechError.classList.add('hidden');
        }

        // Poll for workflow completion
        async function pollForResult(runId, apiKey, userId) {
            const maxAttempts = 60; // 2 minutes max
            const pollInterval = 2000; // 2 seconds
            
            for (let attempt = 0; attempt < maxAttempts; attempt++) {
                try {
                    const statusUrl = `https://api.gumloop.com/api/v1/get_pl_run?run_id=${runId}&api_key=${apiKey}&user_id=${userId}`;
                    const response = await fetch(statusUrl);
                    const data = await response.json();
                    
                    console.log('Poll response:', data);
                    
                    // Update status display
                    updateProcessingStatus(data.state || 'PROCESSING', attempt + 1);
                    
                    // Check if complete
                    if (data.state === 'DONE' || data.state === 'COMPLETED') {
                        // Extract the output - adjust based on your workflow's output structure
                        const output = data.outputs?.output || 
                                       data.outputs?.Response ||
                                       data.output ||
                                       data.result ||
                                       (data.outputs && Object.values(data.outputs)[0]) ||
                                       JSON.stringify(data.outputs || data, null, 2);
                        return { success: true, output };
                    }
                    
                    if (data.state === 'FAILED' || data.state === 'ERROR') {
                        return { success: false, error: data.error || 'Workflow failed' };
                    }
                    
                    // Wait before next poll
                    await new Promise(resolve => setTimeout(resolve, pollInterval));
                    
                } catch (error) {
                    console.error('Polling error:', error);
                    // Continue polling on network errors
                    await new Promise(resolve => setTimeout(resolve, pollInterval));
                }
            }
            
            return { success: false, error: 'Timeout waiting for workflow to complete' };
        }

        function updateProcessingStatus(state, attempt) {
            const statusMap = {
                'QUEUED': 'Queued...',
                'RUNNING': 'Processing...',
                'PROCESSING': 'Processing...',
                'DONE': 'Complete!',
                'COMPLETED': 'Complete!',
                'FAILED': 'Failed',
                'ERROR': 'Error'
            };
            
            const statusText = statusMap[state] || state;
            
            responseContainer.innerHTML = `
                <div class="response-card processing">
                    <div class="response-header">
                        <div class="processing-spinner"></div>
                        Getting Directions
                    </div>
                    <div class="processing-status">
                        <div class="processing-spinner"></div>
                        <div class="processing-text">
                            ${statusText} <span>(${attempt * 2}s)</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // Text-to-Speech
        function speakDirections() {
            if (!currentDirections) return;
            
            if (isSpeaking) {
                window.speechSynthesis.cancel();
                isSpeaking = false;
                updateSpeakButton();
                return;
            }
            
            const utterance = new SpeechSynthesisUtterance(currentDirections);
            utterance.rate = 0.9;
            utterance.pitch = 1;
            
            utterance.onstart = () => {
                isSpeaking = true;
                updateSpeakButton();
            };
            
            utterance.onend = () => {
                isSpeaking = false;
                updateSpeakButton();
            };
            
            window.speechSynthesis.speak(utterance);
        }

        function updateSpeakButton() {
            const btn = document.getElementById('speakBtn');
            if (!btn) return;
            
            if (isSpeaking) {
                btn.classList.add('speaking');
                btn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25v13.5m-7.5-13.5v13.5" />
                    </svg>
                    Stop Speaking
                `;
            } else {
                btn.classList.remove('speaking');
                btn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" />
                    </svg>
                    Read Aloud
                `;
            }
        }

        // Show directions with formatting
        function showDirections(text) {
            currentDirections = text;
            
            // Format the text for better readability
            const formattedText = text
                .replace(/\n/g, '<br>')
                .replace(/(\d+\.)/g, '<strong>$1</strong>')
                .replace(/(Step \d+)/gi, '<strong>$1</strong>')
                .replace(/(Turn left|Turn right|Go straight|Continue|Walk|Head)/gi, '<strong>$1</strong>');
            
            responseContainer.innerHTML = `
                <div class="response-card">
                    <div class="response-header">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498 4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 0 0-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0Z" />
                        </svg>
                        Walking Directions
                    </div>
                    <div class="directions-content">
                        ${formattedText}
                    </div>
                    <button class="speak-button" id="speakBtn" onclick="speakDirections()">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" />
                        </svg>
                        Read Aloud
                    </button>
                </div>
            `;
        }

        function showError(message) {
            responseContainer.innerHTML = `
                <div class="response-card error">
                    <div class="response-header">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
                        </svg>
                        Error
                    </div>
                    <div class="directions-content" style="color: var(--accent-red);">
                        ${message}
                    </div>
                </div>
            `;
        }

        // Main trigger function
        async function triggerWorkflow() {
            const url = webhookUrl.value.trim();
            
            if (!url) {
                showError('Please enter your Gumloop API URL');
                return;
            }

            const urlParams = parseWebhookUrl(url);
            if (!urlParams || !urlParams.apiKey) {
                showError('Invalid URL. Make sure it includes api_key parameter.');
                return;
            }

            // Update button to loading state
            submitButton.classList.add('loading');
            submitButton.innerHTML = `
                <div class="spinner"></div>
                <span>Starting...</span>
            `;

            const payload = buildPayload();

            try {
                // Step 1: Trigger the workflow
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const triggerData = await response.json();
                console.log('Trigger response:', triggerData);

                if (!triggerData.run_id) {
                    throw new Error('No run_id returned from workflow');
                }

                // Step 2: Poll for completion
                submitButton.innerHTML = `
                    <div class="spinner"></div>
                    <span>Processing...</span>
                `;

                const result = await pollForResult(
                    triggerData.run_id, 
                    urlParams.apiKey,
                    urlParams.userId
                );

                if (result.success) {
                    showDirections(result.output);
                } else {
                    showError(result.error);
                }

            } catch (error) {
                console.error('Workflow error:', error);
                showError(`Error: ${error.message}`);
            }

            // Reset button
            submitButton.classList.remove('loading');
            submitButton.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.768 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
                </svg>
                <span>Get Directions</span>
            `;
        }

        // Event Listeners
        micButton.addEventListener('click', toggleRecording);
        clearSpeech.addEventListener('click', clearSpeechText);
        submitButton.addEventListener('click', triggerWorkflow);
        refreshLocation.addEventListener('click', () => {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            updateGpsStatus('inactive', 'Refreshing...');
            initGeolocation();
        });

        // Initialize
        initGeolocation();
        initSpeechRecognition();

        // Load saved webhook URL
        const savedUrl = localStorage.getItem('gumloop_webhook_url');
        if (savedUrl) webhookUrl.value = savedUrl;

        webhookUrl.addEventListener('change', () => {
            localStorage.setItem('gumloop_webhook_url', webhookUrl.value);
        });
    </script>
</body>
</html>
