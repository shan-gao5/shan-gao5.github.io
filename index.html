<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0f">
    <title>Navigator</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a25;--blue:#3b82f6;--cyan:#22d3ee;--green:#10b981;--red:#ef4444;--text:#f8fafc;--text2:#94a3b8;--muted:#64748b;--border:rgba(148,163,184,0.1)}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
        .app{display:flex;flex-direction:column;height:100vh;height:100dvh}
        .map-section{flex:1;position:relative;min-height:300px}
        #map{width:100%;height:100%}
        .overlay{position:absolute;top:16px;left:16px;right:16px;z-index:1000;display:flex;justify-content:space-between;pointer-events:none}
        .overlay>*{pointer-events:auto}
        .logo{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2);border-radius:12px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
        .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),var(--cyan));border-radius:8px;display:flex;align-items:center;justify-content:center}
        .logo-icon svg{width:18px;height:18px;color:#fff}
        .logo-text{font-size:1rem;font-weight:600}
        .badge{display:flex;align-items:center;gap:6px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;font-family:'Space Mono',monospace;font-size:.7rem;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
        .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
        .dot.error{background:var(--red);animation:none}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
        .route-card{position:absolute;bottom:16px;left:16px;right:16px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;z-index:1000;display:none;box-shadow:0 -4px 30px rgba(0,0,0,0.4)}
        .route-card.visible{display:block;animation:slideUp .3s ease}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .stats{display:flex;gap:20px;margin-bottom:12px}
        .stat{display:flex;align-items:center;gap:8px}
        .stat-icon{width:36px;height:36px;background:var(--bg3);border-radius:10px;display:flex;align-items:center;justify-content:center}
        .stat-icon svg{width:18px;height:18px;color:var(--cyan)}
        .stat-value{font-size:1.125rem;font-weight:700}
        .stat-label{font-size:.7rem;color:var(--muted);text-transform:uppercase}
        .endpoints{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg);border-radius:10px;font-size:.8125rem;cursor:pointer}
        .ep-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
        .ep-dot.start{background:var(--green)}
        .ep-dot.end{background:var(--red)}
        .ep-line{width:2px;height:20px;background:var(--muted);margin-left:4px}
        .ep-text{flex:1;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .loading{position:absolute;inset:0;background:rgba(10,10,15,0.85);display:none;align-items:center;justify-content:center;z-index:500}
        .loading.visible{display:flex}
        .spinner{width:48px;height:48px;border:4px solid var(--bg3);border-top-color:var(--cyan);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .loading-text{color:var(--text2);font-size:.875rem;text-align:center}
        .panel{background:var(--bg2);border-top:1px solid var(--border);padding:16px;padding-bottom:max(16px,env(safe-area-inset-bottom))}
        .input-row{display:flex;gap:10px;margin-bottom:12px}
        .speech-input{flex:1;display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:12px;cursor:pointer}
        .speech-input.recording{border-color:var(--red);background:rgba(239,68,68,0.1)}
        .speech-input svg{width:20px;height:20px;color:var(--cyan);flex-shrink:0}
        .speech-input.recording svg{color:var(--red)}
        .speech-text{flex:1;font-size:.875rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .speech-text.placeholder{color:var(--muted)}
        .clear-btn{padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text2);cursor:pointer}
        .clear-btn svg{width:20px;height:20px}
        .submit-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--green),#34d399);border:none;border-radius:14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 20px rgba(16,185,129,0.3)}
        .submit-btn:disabled{opacity:.6;cursor:not-allowed}
        .submit-btn svg{width:20px;height:20px}
        .btn-spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
        .backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1500;opacity:0;pointer-events:none;transition:opacity .3s}
        .backdrop.visible{opacity:1;pointer-events:auto}
        .dir-panel{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top-left-radius:24px;border-top-right-radius:24px;transform:translateY(100%);transition:transform .3s;z-index:2000;max-height:70vh;display:flex;flex-direction:column}
        .dir-panel.visible{transform:translateY(0)}
        .dir-handle{padding:12px;display:flex;justify-content:center;cursor:pointer}
        .dir-bar{width:40px;height:4px;background:var(--muted);border-radius:2px}
        .dir-header{display:flex;align-items:center;justify-content:space-between;padding:0 20px 16px;border-bottom:1px solid var(--border)}
        .dir-title{display:flex;align-items:center;gap:10px;font-size:1rem;font-weight:600}
        .dir-title svg{width:22px;height:22px;color:var(--cyan)}
        .dir-close{padding:8px;background:var(--bg3);border:none;border-radius:8px;color:var(--text2);cursor:pointer}
        .dir-close svg{width:20px;height:20px}
        .dir-content{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
        .dir-text{font-size:.9375rem;line-height:1.8}
        .dir-text strong{color:var(--cyan)}
        .speak-btn{margin:16px 20px;padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:.875rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
        .speak-btn.speaking{background:rgba(34,211,238,0.1);border-color:var(--cyan);color:var(--cyan)}
        .speak-btn svg{width:18px;height:18px}
        .toast{position:fixed;top:20px;left:20px;right:20px;background:rgba(239,68,68,0.95);color:#fff;padding:14px 18px;border-radius:12px;font-size:.875rem;z-index:3000;display:none;align-items:center;gap:10px}
        .toast.visible{display:flex;animation:slideDown .3s ease}
        @keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
        .toast svg{width:20px;height:20px;flex-shrink:0}
        .wave{display:flex;align-items:center;gap:2px;height:16px}
        .wave span{width:3px;height:100%;background:var(--red);border-radius:2px;animation:wave .8s ease-in-out infinite}
        .wave span:nth-child(1){animation-delay:0s}
        .wave span:nth-child(2){animation-delay:.1s}
        .wave span:nth-child(3){animation-delay:.2s}
        .wave span:nth-child(4){animation-delay:.3s}
        @keyframes wave{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}
    </style>
</head>
<body>
<div class="app">
    <div class="map-section">
        <div id="map"></div>
        <div class="overlay">
            <div class="logo">
                <div class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/></svg></div>
                <span class="logo-text">Navigator</span>
            </div>
            <div class="badge"><span class="dot" id="gpsStatus"></span><span id="gpsText">GPS</span></div>
        </div>
        <div class="route-card" id="routeCard">
            <div class="stats">
                <div class="stat">
                    <div class="stat-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg></div>
                    <div><div class="stat-value" id="duration">--</div><div class="stat-label">Duration</div></div>
                </div>
                <div class="stat">
                    <div class="stat-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498 4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 0 0-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0Z"/></svg></div>
                    <div><div class="stat-value" id="distance">--</div><div class="stat-label">Distance</div></div>
                </div>
            </div>
            <div class="endpoints" onclick="toggleDir()">
                <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div class="ep-dot start"></div><div class="ep-line"></div><div class="ep-dot end"></div></div>
                <div style="flex:1;min-width:0"><div class="ep-text" id="startPt">Your location</div><div class="ep-text" id="endPt" style="margin-top:8px">Destination</div></div>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:20px;height:20px;color:var(--muted)"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 15.75 7.5-7.5 7.5 7.5"/></svg>
            </div>
        </div>
        <div class="loading" id="loading"><div><div class="spinner"></div><div class="loading-text" id="loadingText">Getting directions...</div></div></div>
    </div>
    <div class="panel">
        <div class="input-row">
            <div class="speech-input" id="speechInput" onclick="toggleRec()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" id="micIcon"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z"/></svg>
                <span class="speech-text placeholder" id="speechText">Tap to speak destination...</span>
            </div>
            <button class="clear-btn" onclick="clearSpeech()"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg></button>
        </div>
        <button class="submit-btn" id="submitBtn" onclick="getDirections()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5"/></svg>
            <span>Get Directions</span>
        </button>
    </div>
</div>
<div class="backdrop" id="backdrop" onclick="closeDir()"></div>
<div class="dir-panel" id="dirPanel">
    <div class="dir-handle" onclick="closeDir()"><div class="dir-bar"></div></div>
    <div class="dir-header">
        <div class="dir-title"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498 4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 0 0-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0Z"/></svg>AI Directions</div>
        <button class="dir-close" onclick="closeDir()"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg></button>
    </div>
    <div class="dir-content"><div class="dir-text" id="dirText">Directions will appear here...</div></div>
    <button class="speak-btn" id="speakBtn" onclick="speak()"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z"/></svg>Read Aloud</button>
</div>
<div class="toast" id="toast"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/></svg><span id="toastText">Error</span></div>

<script>
const CFG={gumloop:{user_id:"MKcuTxrgvnajIQ1nUqVwpdSDAgt2",saved_item_id:"fNFvVMiurbn54qQWLBf6Fb",api_key:"0349ffe0ec7a4a1d9bd80351e47e9097"},gmaps:"AIzaSyCgYR39OZHspxTnxv2CGWP4IV0CW4VqVmU"};
let map,dirService,dirRenderer,locMarker,destMarker,loc={lat:null,lng:null,addr:null},speech='',isRec=false,recog=null,dirs='',isSpeaking=false;

function initMap(){
    map=new google.maps.Map(document.getElementById('map'),{center:{lat:45.5017,lng:-73.5673},zoom:15,disableDefaultUI:true,zoomControl:true,
        styles:[{elementType:"geometry",stylers:[{color:"#1a1a25"}]},{elementType:"labels.text.stroke",stylers:[{color:"#1a1a25"}]},{elementType:"labels.text.fill",stylers:[{color:"#94a3b8"}]},{featureType:"road",elementType:"geometry",stylers:[{color:"#2d2d3d"}]},{featureType:"road.highway",elementType:"geometry",stylers:[{color:"#3d3d50"}]},{featureType:"water",elementType:"geometry",stylers:[{color:"#0e1626"}]},{featureType:"poi.park",elementType:"geometry",stylers:[{color:"#1a2e1a"}]}]});
    dirService=new google.maps.DirectionsService();
    dirRenderer=new google.maps.DirectionsRenderer({map,suppressMarkers:true,polylineOptions:{strokeColor:'#22d3ee',strokeWeight:5,strokeOpacity:0.8}});
    initGeo();initSpeech();
}

function initGeo(){if(!navigator.geolocation){setGps('error','N/A');return}navigator.geolocation.watchPosition(onPos,()=>setGps('error','Error'),{enableHighAccuracy:true,timeout:15000,maximumAge:0})}
function onPos(p){loc.lat=p.coords.latitude;loc.lng=p.coords.longitude;const pos={lat:loc.lat,lng:loc.lng};if(locMarker)locMarker.setPosition(pos);else{locMarker=new google.maps.Marker({position:pos,map,icon:{path:google.maps.SymbolPath.CIRCLE,scale:10,fillColor:'#3b82f6',fillOpacity:1,strokeColor:'#fff',strokeWeight:3}});map.setCenter(pos)}setGps('ok','Active');geocode(loc.lat,loc.lng)}
function setGps(s,t){const d=document.getElementById('gpsStatus');d.className='dot'+(s==='error'?' error':'');document.getElementById('gpsText').textContent=t}
async function geocode(lat,lng){try{const g=new google.maps.Geocoder(),r=await g.geocode({location:{lat,lng}});if(r.results[0]){loc.addr=r.results[0].formatted_address;document.getElementById('startPt').textContent=loc.addr}}catch(e){loc.addr=`${lat.toFixed(6)}, ${lng.toFixed(6)}`}}

function initSpeech(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return;recog=new SR();recog.continuous=true;recog.interimResults=true;recog.lang='en-US';
    recog.onstart=()=>{isRec=true;updateMic()};
    recog.onresult=e=>{let i='',f='';for(let x=e.resultIndex;x<e.results.length;x++)e.results[x].isFinal?f+=e.results[x][0].transcript:i+=e.results[x][0].transcript;if(f)speech=(speech+' '+f).trim();document.getElementById('speechText').textContent=speech+(i?' '+i:'')||'Listening...';document.getElementById('speechText').classList.remove('placeholder')};
    recog.onerror=e=>{if(e.error!=='no-speech')showToast('Speech: '+e.error);stopRec()};
    recog.onend=()=>{if(isRec)try{recog.start()}catch(e){stopRec()}}}
function toggleRec(){isRec?stopRec():startRec()}
function startRec(){if(recog)try{recog.start()}catch(e){}}
function stopRec(){isRec=false;if(recog)recog.stop();updateMic()}
function updateMic(){const inp=document.getElementById('speechInput');inp.classList.toggle('recording',isRec);document.getElementById('micIcon').outerHTML=isRec?'<div class="wave" id="micIcon"><span></span><span></span><span></span><span></span></div>':'<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" id="micIcon"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z"/></svg>'}
function clearSpeech(){speech='';document.getElementById('speechText').textContent='Tap to speak destination...';document.getElementById('speechText').classList.add('placeholder')}

async function triggerGL(payload){const r=await fetch(`https://api.gumloop.com/api/v1/start_pipeline?user_id=${CFG.gumloop.user_id}&saved_item_id=${CFG.gumloop.saved_item_id}`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${CFG.gumloop.api_key}`},body:JSON.stringify(payload)});return r.json()}
async function getGLStatus(id){const r=await fetch(`https://api.gumloop.com/api/v1/get_pl_run?run_id=${id}&user_id=${CFG.gumloop.user_id}`,{headers:{'Authorization':`Bearer ${CFG.gumloop.api_key}`}});return r.json()}

function showRoute(origin,dest){return new Promise((res,rej)=>{dirService.route({origin,destination:dest,travelMode:google.maps.TravelMode.WALKING},(r,s)=>{if(s==='OK'){dirRenderer.setDirections(r);const l=r.routes[0].legs[0];document.getElementById('duration').textContent=l.duration.text;document.getElementById('distance').textContent=l.distance.text;document.getElementById('startPt').textContent=l.start_address;document.getElementById('endPt').textContent=l.end_address;if(destMarker)destMarker.setMap(null);destMarker=new google.maps.Marker({position:l.end_location,map,icon:{path:google.maps.SymbolPath.CIRCLE,scale:10,fillColor:'#ef4444',fillOpacity:1,strokeColor:'#fff',strokeWeight:3}});const b=new google.maps.LatLngBounds();b.extend(l.start_location);b.extend(l.end_location);map.fitBounds(b,{padding:80});document.getElementById('routeCard').classList.add('visible');res(r)}else rej(new Error('Route: '+s))})})}

async function getDirections(){if(!loc.lat){showToast('Waiting for location...');return}
    const locStr=loc.addr||`${loc.lat}, ${loc.lng}`,userSpeech=speech||'I want to walk to Eaton Centre in Montreal';
    const btn=document.getElementById('submitBtn');btn.disabled=true;btn.innerHTML='<div class="btn-spinner"></div><span>Starting...</span>';showLoad(true);
    try{const t=await triggerGL({speech_input:userSpeech,location_input:locStr});if(!t.run_id)throw new Error('Failed to start');
        const start=Date.now();while(Date.now()-start<120000){updateLoad(`Getting directions... (${Math.round((Date.now()-start)/1000)}s)`);const st=await getGLStatus(t.run_id);
            if(st.state==='DONE'||st.state==='COMPLETED'){const out=st.outputs?.output||st.outputs?.Response||(st.outputs&&Object.values(st.outputs)[0])||'';
                let dest='';if(st.log){const dl=st.log.find(l=>l.includes("'Destination' extracted"));if(dl){const m=dl.match(/extracted successfully: (.+)/);if(m)dest=m[1]}}
                if(!dest){const m=userSpeech.match(/to\s+(.+?)(?:\s+in|\s+from|$)/i);dest=m?m[1]:'Eaton Centre'}
                try{await showRoute({lat:loc.lat,lng:loc.lng},dest+', Montreal, Canada')}catch(e){console.error(e)}
                dirs=out;document.getElementById('dirText').innerHTML=out.replace(/\n/g,'<br>').replace(/(\d+\.)/g,'<strong>$1</strong>').replace(/(Turn left|Turn right|Go straight|Continue|Walk|Head|Cross)/gi,'<strong>$1</strong>');showLoad(false);break}
            if(st.state==='FAILED'||st.state==='ERROR'){let err='Workflow failed';if(st.log){const el=st.log.find(l=>l.includes('Failed'));if(el)err=el.replace(/\u001b\[\d+m/g,'')}throw new Error(err)}
            await new Promise(r=>setTimeout(r,2000))}}
    catch(e){showToast(e.message);showLoad(false)}
    btn.disabled=false;btn.innerHTML='<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5"/></svg><span>Get Directions</span>'}

function showLoad(v){document.getElementById('loading').classList.toggle('visible',v)}
function updateLoad(t){document.getElementById('loadingText').textContent=t}
function showToast(m){document.getElementById('toastText').textContent=m;document.getElementById('toast').classList.add('visible');setTimeout(()=>document.getElementById('toast').classList.remove('visible'),4000)}
function toggleDir(){document.getElementById('dirPanel').classList.add('visible');document.getElementById('backdrop').classList.add('visible')}
function closeDir(){document.getElementById('dirPanel').classList.remove('visible');document.getElementById('backdrop').classList.remove('visible')}
function speak(){if(!dirs)return;if(isSpeaking){speechSynthesis.cancel();isSpeaking=false;updateSpeak();return}const u=new SpeechSynthesisUtterance(dirs);u.rate=0.9;u.onstart=()=>{isSpeaking=true;updateSpeak()};u.onend=()=>{isSpeaking=false;updateSpeak()};speechSynthesis.speak(u)}
function updateSpeak(){const b=document.getElementById('speakBtn');b.classList.toggle('speaking',isSpeaking);b.innerHTML=isSpeaking?'<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25v13.5m-7.5-13.5v13.5"/></svg>Stop':'<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z"/></svg>Read Aloud'}
</script>
