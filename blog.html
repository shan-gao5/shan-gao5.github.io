<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog | Shan Gao</title>
  <link rel="stylesheet" href="styles/theme.css">
</head>
<body class="turbo-site">
  <header class="turbo-menubar">
    <h1>Blog</h1>
    <nav aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="mailto:shan.gao5@mail.mcgill.ca">shan.gao5@mail.mcgill.ca</a>
    </nav>
  </header>

  <main class="turbo-shell">
    <section aria-label="Blog filters" class="turbo-filters">
      <label>
        Section
        <select id="section-filter">
          <option value="">All sections</option>
        </select>
      </label>

      <label>
        From
        <input id="from-filter" type="date">
      </label>

      <label>
        To
        <input id="to-filter" type="date">
      </label>

      <label>
        Sort
        <select id="sort-filter">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
        </select>
      </label>
    </section>

    <ul id="posts" class="turbo-list" aria-live="polite"></ul>
  </main>

  <footer class="turbo-footer">
    <a href="index.html">Back to Shan Gao</a>
  </footer>

  <script>
    const postsList = document.querySelector("#posts");
    const sectionFilter = document.querySelector("#section-filter");
    const fromFilter = document.querySelector("#from-filter");
    const toFilter = document.querySelector("#to-filter");
    const sortFilter = document.querySelector("#sort-filter");
    let posts = [];

    function formatDate(value) {
      const date = new Date(`${value}T00:00:00`);
      return new Intl.DateTimeFormat("en", {
        year: "numeric",
        month: "long",
        day: "numeric"
      }).format(date);
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderPosts() {
      const section = sectionFilter.value;
      const from = fromFilter.value;
      const to = toFilter.value;
      const direction = sortFilter.value;

      const visiblePosts = posts
        .filter((post) => !section || post.section === section)
        .filter((post) => !from || post.date >= from)
        .filter((post) => !to || post.date <= to)
        .sort((left, right) => {
          const comparison = left.date.localeCompare(right.date);
          return direction === "oldest" ? comparison : -comparison;
        });

      if (visiblePosts.length === 0) {
        postsList.innerHTML = '<li class="turbo-empty">No blog posts match these filters yet.</li>';
        return;
      }

      postsList.innerHTML = visiblePosts.map((post) => `
        <li class="turbo-card">
          <h2><a href="${escapeHtml(post.url)}">${escapeHtml(post.title)}</a></h2>
          <div class="meta">${formatDate(post.date)} · ${escapeHtml(post.section)}</div>
        </li>
      `).join("");
    }

    async function loadPosts() {
      try {
        const response = await fetch("blog/index.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Could not load blog index.");
        }

        posts = await response.json();
        const sections = [...new Set(posts.map((post) => post.section).filter(Boolean))].sort();
        for (const section of sections) {
          const option = document.createElement("option");
          option.value = section;
          option.textContent = section;
          sectionFilter.append(option);
        }

        renderPosts();
      } catch (error) {
        postsList.innerHTML = '<li class="turbo-empty">No blog posts have been published yet.</li>';
      }
    }

    for (const control of [sectionFilter, fromFilter, toFilter, sortFilter]) {
      control.addEventListener("input", renderPosts);
    }

    loadPosts();
  </script>
</body>
</html>
